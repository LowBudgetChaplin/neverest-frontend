pluginManagement {
    def props = new Properties()
    file("local.properties").withInputStream { props.load(it) }
    def flutterSdkPath = props.getProperty("flutter.sdk")
    assert flutterSdkPath != null : "flutter.sdk not set in local.properties"

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.6.1" apply false
    // START: FlutterFire Configuration
    id "com.google.gms.google-services" version "4.3.15" apply false
    // END: FlutterFire Configuration
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    // id "com.google.gms.google-services" version "4.4.0" apply false
    // id "com.google.firebase.crashlytics" version "2.9.9" apply false
}

include ":app"

def flutterDefaults = [
    compileSdkVersion: 35,
    minSdkVersion: 23,
    targetSdkVersion: 35,
]

// Some third-party Android plugins read flutter.* SDK values directly.
// Define safe defaults for plugin modules when generated state is stale.
gradle.beforeProject { project ->
    if (project.path == ':app') {
        return
    }
    if (!project.extensions.extraProperties.has('flutter')) {
        project.extensions.extraProperties.set('flutter', flutterDefaults)
    }
}